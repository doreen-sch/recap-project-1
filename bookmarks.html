      <section class="card" aria-label="Question">

            />

          <svg class="bookmark-filled" viewBox="0 0 24 24">
            <path
              d="M2.849,23.55a2.954,2.954,0,0,0,3.266-.644L12,17.053l5.885,5.853a2.956,2.956,0,0,0,2.1.881,3.05,3.05,0,0,0,1.17-.237A2.953,2.953,0,0,0,23,20.779V5a5.006,5.006,0,0,0-5-5H6A5.006,5.006,0,0,0,1,5V20.779A2.953,2.953,0,0,0,2.849,23.55Z"
            />
          </svg>
        </button>
        <h2 class="card__question">What is a Patronus?</h2>
        <p class="card__answer" id="answer-text">A magical guardian.</p>
        <button
          type="button"
          class="card__button"
          data-js="answer-button"
          aria-expanded="false"
          aria-controls="answer-text"
        >
          <span class="show-text">Show Answer</span>
          <span class="hide-text">Hide Answer</span>
        </button>
        <ul class="card__tags">
          <li class="tag">Magic</li>
          <li class="tag">Hogwarts</li>
        </ul>
