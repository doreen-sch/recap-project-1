    <title>Harry Potter Quiz-App</title>

  <body>
    <header class="app-header">
      <h1>O.W. L. Challenge</h1>
      <img src="assets/owl.png" alt="owl icon" />

      <section class="card">
        <input type="checkbox" id="bookmark1" class="bookmark-toggle" />
        <label for="bookmark1" class="bookmark">
          <img
            class="bookmark-light"
            src="assets/bookmark-light.png"
            alt="bookmark"
          />
          <img
            class="bookmark-dark"
            src="assets/bookmark-dark.png"
            alt="bookmark active"
          />
        </label>
        <h2 class="card__question">Question?</h2>
        <input type="checkbox" id="answer1" class="answer-toggle" />
        <p class="card__answer">Answer.</p>
        <label for="answer1" class="card__button"
          ><span class="show-text">Show Answer</span>
          <span class="hide-text">Hide Answer</span>
        </label>
        <ul class="card__tags">
          <li class="tag">tag 1</li>
          <li class="tag">tag 2</li>
        </ul>
