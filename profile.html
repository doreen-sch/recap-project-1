<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Harry Potter Quiz-App</title>
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body>
    <header class="app-header">
      <h1>O.W. L. Exam</h1>
      <a href="index.html">
        <img src="assets/owl.png" alt="owl icon" />
      </a>
    </header>
    <main>
      <section class="card profile-card">
        <h2 class="profile">
          <img
            src="assets/user-light.png"
            alt="profile icon"
            class="profile__icon"
          />Jane Doe
        </h2>
        <h3 class="about__me">About me</h3>
        <p class="about__me">
          I am a passionate Harry Potter fan who loves testing my wizarding
          knowledge. I collect quiz points, bookmark tricky questions, and aim
          for Outstanding in every challenge. Go Hufflepuff! 🦡
        </p>
        <ul class="profile__tags">
          <li class="tag">
            <img
              src="assets/home-light.png"
              alt=""
              class="tag__icon"
            />questions number
          </li>
          <li class="tag">
            <img
              src="assets/bookmark-light.png"
              alt=""
              class="tag__icon"
            />bookmarks number
          </li>
        </ul>
      </section>
      <section class="card profile-card">
        <h2 class="settings">Settings</h2>
        <label class="settings__item">
          Dark Mode
          <input type="checkbox" class="switch" />
        </label>
      </section>
    </main>
    <footer class="app-footer">
      <nav class="nav">
        <a href="index.html" class="nav__link">
          <img src="/assets/home-light.png" alt="home" />
        </a>
        <a href="bookmarks.html" class="nav__link">
          <img src="/assets/bookmark-light.png" alt="bookmarks" />
        </a>
        <a href="profile.html" class="nav__link nav__link--active">
          <img src="/assets/user-light.png" alt="profile" />
        </a>
      </nav>
    </footer>
  </body>
</html>
